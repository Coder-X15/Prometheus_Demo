apiVersion: apps/v1
kind: Deployment
metadata:
  name: location-finder-bcd2-deployment
  labels:
    app: location-finder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: location-finder
  template:
    metadata:
      labels:
        app: location-finder
    spec:
      containers:
      - name: location-finder-container
        image: location_finder_image:latest
        imagePullPolicy: IfNotPresent 
        ports:
        - containerPort: 5000
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
        env:
        - name: FLASK_ENV
          value: "production"
        - name: FLASK_APP
          value: "app.py"
        - name: FLASK_RUN_HOST
          value: "0.0.0.0"
        - name: FLASK_RUN_PORT
          value: "5000"
      - name: prometheus
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
        volumeMounts:
        - name: prometheus-config-volume
          mountPath: /etc/prometheus/
      volumes:
      - name: prometheus-config-volume
        configMap:
          name: prometheus-config